[package]
name = "futhark-tauri-shell"
version = "0.1.0"
description = "Tauri shell hosting the Futhark suite (phase 1 PoC — Laguz only)"
authors = ["Martin Stenkilde"]
license = "UNLICENSED"
edition = "2021"

[lib]
name = "futhark_tauri_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
