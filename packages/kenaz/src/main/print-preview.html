<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Print Preview — Kenaz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #e8e8e8;
      color: #1c1917;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #d1d1d1;
      flex-shrink: 0;
      -webkit-app-region: drag;
      gap: 12px;
    }
    .toolbar button, .toolbar select, .toolbar input {
      -webkit-app-region: no-drag;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar label {
      font-size: 12px;
      color: #666;
    }
    .toolbar select, .toolbar input[type="number"] {
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      outline: none;
    }
    .toolbar select:focus, .toolbar input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
    }
    .toolbar input[type="number"] { width: 48px; text-align: center; }

    .btn {
      font-size: 12px;
      padding: 5px 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      font-weight: 500;
      outline: none;
    }
    .btn:hover { background: #f0f0f0; }
    .btn:active { background: #e0e0e0; }
    .btn-primary {
      background: #007aff;
      color: white;
      border-color: #007aff;
    }
    .btn-primary:hover { background: #0066d6; }
    .btn-primary:active { background: #0055b3; }

    /* ── Content area ── */
    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .page-container {
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      border-radius: 2px;
      width: 816px;       /* 8.5in at 96dpi */
      min-height: 1056px;  /* 11in at 96dpi */
      overflow: hidden;
      flex-shrink: 0;
    }
    .page-container iframe {
      width: 100%;
      border: none;
      min-height: 1056px;
      display: block;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <label>Paper:</label>
      <select id="paperSize">
        <option value="letter" selected>US Letter</option>
        <option value="a4">A4</option>
      </select>
      <label style="margin-left: 8px;">Copies:</label>
      <input type="number" id="copies" value="1" min="1" max="99">
    </div>
    <div class="toolbar-group">
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="printBtn">Print</button>
    </div>
  </div>
  <div class="preview-area">
    <div class="page-container" id="pageContainer">
      <div class="loading" id="loadingMsg">Preparing preview…</div>
      <iframe id="contentFrame" sandbox="allow-same-origin" scrolling="no" style="display:none;"></iframe>
    </div>
  </div>
  <script src="print-preview.js"></script>
</body>
</html>
