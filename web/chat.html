<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kenaz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #242424;
    --text: #e8e4dc;
    --text-dim: #6b6560;
    --text-mid: #a09890;
    --accent: #c8a96e;
    --accent-dim: #7a6540;
    --user-bg: #1c1a16;
    --code-bg: #111111;
    --scrollbar: #2a2a2a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 820px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .model-badge {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4a9;
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 6px #4a9;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
    animation: fadeIn 0.6s ease;
  }

  .empty-state .big-letter {
    font-family: 'Instrument Serif', serif;
    font-size: 72px;
    color: var(--border);
    line-height: 1;
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .message-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .message.user .message-label { color: var(--accent-dim); }
  .message.assistant .message-label { color: var(--text-dim); }

  .message-content {
    padding: 14px 18px;
    border-radius: 4px;
    line-height: 1.7;
    font-size: 13.5px;
  }

  .message.user .message-content {
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-left: 2px solid var(--accent-dim);
  }

  .message.assistant .message-content {
    background: transparent;
    color: var(--text);
    padding-left: 0;
    padding-right: 0;
  }

  .message-content code {
    font-family: 'Geist Mono', monospace;
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12.5px;
    color: var(--accent);
  }

  .message-content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent-dim);
    padding: 14px 16px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 10px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }

  .message-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text-mid);
    font-size: 12.5px;
  }

  .message-content p { margin-bottom: 8px; }
  .message-content p:last-child { margin-bottom: 0; }

  .message-content h1, .message-content h2, .message-content h3 {
    font-family: 'Instrument Serif', serif;
    color: var(--accent);
    margin: 14px 0 6px;
    font-weight: 400;
  }

  .message-content h1 { font-size: 20px; }
  .message-content h2 { font-size: 17px; }
  .message-content h3 { font-size: 15px; }

  .message-content ul, .message-content ol {
    padding-left: 20px;
    margin: 6px 0;
  }

  .message-content li { margin-bottom: 3px; }
  .message-content strong { color: var(--text); font-weight: 500; }
  .message-content em { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--text-mid); font-size: 15px; }

  .message-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .thinking {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 8px 0;
    letter-spacing: 0.06em;
  }

  .thinking-dots { display: flex; gap: 4px; }

  .thinking-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent-dim);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  #input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    transition: border-color 0.15s;
  }

  .input-wrapper:focus-within { border-color: var(--accent-dim); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar) transparent;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    background: none;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    align-self: flex-end;
  }

  #send-btn:hover { background: var(--accent-dim); color: var(--bg); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .new-chat-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 3px;
    transition: color 0.15s;
  }

  .new-chat-btn:hover { color: var(--text-mid); }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">kenaz</span>
    <div style="display:flex;align-items:center;gap:16px">
      <button class="new-chat-btn" onclick="newChat()">+ new chat</button>
      <span class="model-badge"><span class="status-dot"></span>gemma 4 · 26b</span>
    </div>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big-letter">𐰚</div>
      <p>ask anything</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="type a message..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">send</button>
    </div>
    <div class="hint">enter to send &nbsp;·&nbsp; shift+enter for new line</div>
  </div>
</div>

<script>
  const MODEL = 'mlx-community/gemma-4-26b-a4b-it-4bit';
  const API = '/api/v1/chat/completions';

  let history = [];
  let isStreaming = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  function newChat() {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
    inputEl.value = '';
    inputEl.style.height = 'auto';
    inputEl.focus();
  }

  function addMessage(role, content) {
    if (emptyState.parentNode) emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'you' : 'kenaz';

    const contentEl = document.createElement('div');
    contentEl.className = 'message-content';

    if (role === 'user') {
      contentEl.textContent = content;
    } else {
      contentEl.innerHTML = renderMarkdown(content);
    }

    msg.appendChild(label);
    msg.appendChild(contentEl);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return contentEl;
  }

  function addThinking() {
    const thinking = document.createElement('div');
    thinking.className = 'thinking';
    thinking.id = 'thinking';
    thinking.innerHTML = `
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      thinking
    `;
    messagesEl.appendChild(thinking);
    scrollToBottom();
    return thinking;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderMarkdown(text) {
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`
    );

    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    html = html.replace(/^---$/gm, '<hr>');
    html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

    html = html.split(/\n\n+/).map(block => {
      if (block.startsWith('<')) return block;
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

    return html;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    history.push({ role: 'user', content: text });
    addMessage('user', text);

    const thinking = addThinking();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MODEL,
          messages: history,
          max_tokens: 16384,
          stream: false
        })
      });

      thinking.remove();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const reply = data.choices[0].message.content;

      history.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);

    } catch (err) {
      thinking.remove();
      const errEl = addMessage('assistant', `_error: ${err.message}_`);
      console.error(err);
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  inputEl.focus();
</script>
</body>
</html>
